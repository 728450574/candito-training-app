<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体重记录</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */

:root {
  /* ── Brand Identity ── */
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;

  /* ── State Colors ── */
  --state-success: #30D158;
  --state-success-bg: rgba(48, 209, 88, 0.08);
  --state-warning: #FF9F0A;
  --state-warning-bg: rgba(255, 159, 10, 0.08);
  --state-error: #FF3B30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #0A84FF;
  --state-info-bg: rgba(10, 132, 255, 0.08);

  /* ── Accent (training-specific) ── */
  --color-training-main: #0A84FF;
  --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158;
  --color-training-rest: #86868B;

  /* ── Warmth Accent ── */
  --color-warm: #FF6B35;
  --color-warm-light: rgba(255, 107, 53, 0.10);

  /* ── Typography Scale ── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

  --text-xs: 0.6875rem;      /* 11px */
  --text-sm: 0.75rem;         /* 12px */
  --text-base: 0.875rem;      /* 14px */
  --text-md: 1rem;             /* 16px */
  --text-lg: 1.125rem;        /* 18px */
  --text-xl: 1.25rem;         /* 20px */
  --text-2xl: 1.5rem;         /* 24px */
  --text-3xl: 1.75rem;        /* 28px */
  --text-4xl: 2rem;           /* 32px */

  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Surface Depth (border-first, minimal shadow) ── */
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--color-border-light);

  /* ── Transition ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
}

/* ── Utility Classes ── */
.typography-hero {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-primary);
}

.typography-title {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.01em;
  color: var(--color-primary);
}

.typography-subtitle {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--font-weight-medium);
  line-height: var(--leading-tight);
  color: var(--color-primary);
}

.typography-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary);
}

.typography-caption {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary-light);
}

.typography-data {
  font-family: var(--font-mono);
  font-size: var(--text-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
}

.typography-data-lg {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-8 px-4 pt-3 max-w-lg mx-auto">

        <!-- Top Navigation Bar -->
        <header class="flex items-center justify-between mb-5 h-11">
            <a href="#" class="inline-flex items-center justify-center w-8 h-8 rounded-lg" style="color:var(--color-primary);" data-dom-id="back-stats" aria-label="返回">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </a>
            <h1 class="typography-title" style="letter-spacing:-0.01em;">体重记录</h1>
            <div class="w-8"></div>
        </header>

        <!-- Current Weight Card -->
        <section class="rounded-lg p-5 mb-4" style="background:var(--color-surface); box-shadow:var(--shadow-card);" aria-label="当前体重">
            <span class="typography-caption block mb-1">当前体重</span>
            <div class="flex items-baseline gap-1.5 mb-2">
                <span class="whitespace-nowrap" style="font-family:var(--font-mono); font-size:3rem; font-weight:var(--font-weight-bold); color:var(--color-primary); letter-spacing:-0.03em; line-height:1.1;">81.5</span>
                <span class="typography-caption" style="font-size:var(--text-sm); color:var(--color-primary-light);">kg</span>
            </div>
            <div class="flex items-center gap-1.5 mb-1.5">
                <span style="font-family:var(--font-mono); font-size:var(--text-sm); font-weight:var(--font-weight-medium); color:var(--state-success);">&#8595; 0.5kg</span>
                <span class="typography-caption">较上次</span>
            </div>
            <span class="typography-caption">最后记录: 2026年7月3日</span>
        </section>

        <!-- Add Weight Input Card -->
        <section class="rounded-lg p-4 mb-4" style="background:var(--color-surface); box-shadow:var(--shadow-card);" aria-label="记录体重">
            <h2 class="typography-subtitle mb-3" style="font-size:var(--text-md);">记录体重</h2>
            <!-- Weight input -->
            <div class="flex items-center gap-3 mb-3">
                <div class="flex-1 min-w-0 flex items-center rounded-lg px-3 h-12" style="background:var(--color-surface-muted);">
                    <input type="number" step="0.1" placeholder="81.5" class="w-full bg-transparent border-none outline-none" style="font-family:var(--font-mono); font-size:var(--text-lg); font-weight:var(--font-weight-semibold); color:var(--color-primary); min-width:0;" aria-label="输入体重">
                    <span class="typography-caption whitespace-nowrap ml-1" style="color:var(--color-primary-light);">kg</span>
                </div>
            </div>
            <!-- Date + Save row -->
            <div class="flex items-center gap-3">
                <div class="flex-1 min-w-0 flex items-center rounded-lg px-3 h-11" style="background:var(--color-surface-muted);">
                    <span class="typography-caption whitespace-nowrap" style="font-family:var(--font-mono); color:var(--color-primary);">2026年7月4日</span>
                    <i data-lucide="calendar" class="w-3.5 h-3.5 ml-1.5" style="color:var(--color-primary-light);"></i>
                </div>
                <button class="shrink-0 h-11 px-6 rounded-lg whitespace-nowrap" style="background:var(--color-training-main); color:var(--color-surface); font-family:var(--font-sans); font-size:var(--text-base); font-weight:var(--font-weight-semibold);">保存</button>
            </div>
        </section>

        <!-- Weight Trend Chart -->
        <section class="rounded-lg p-4 mb-4" style="background:var(--color-surface); box-shadow:var(--shadow-card);" aria-label="体重趋势">
            <div class="flex items-center justify-between mb-4">
                <h2 class="typography-subtitle" style="font-size:var(--text-md);">体重趋势</h2>
                <span class="typography-caption">近30天</span>
            </div>
            <div class="relative" style="aspect-ratio:16/10;">
                <svg viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" aria-label="体重趋势折线图">
                    <!-- Y-axis labels -->
                    <text x="28" y="42" style="font-family: var(--font-mono); font-size: 10px; fill: var(--color-primary-light); text-anchor: end;">83</text>
                    <text x="28" y="82" style="font-family: var(--font-mono); font-size: 10px; fill: var(--color-primary-light); text-anchor: end;">82</text>
                    <text x="28" y="122" style="font-family: var(--font-mono); font-size: 10px; fill: var(--color-primary-light); text-anchor: end;">81</text>
                    <text x="28" y="162" style="font-family: var(--font-mono); font-size: 10px; fill: var(--color-primary-light); text-anchor: end;">80</text>

                    <!-- Grid lines (horizontal) -->
                    <line x1="36" y1="38" x2="300" y2="38" style="stroke: var(--color-border-light); stroke-width: 0.5px;"/>
                    <line x1="36" y1="78" x2="300" y2="78" style="stroke: var(--color-border-light); stroke-width: 0.5px;"/>
                    <line x1="36" y1="118" x2="300" y2="118" style="stroke: var(--color-border-light); stroke-width: 0.5px;"/>
                    <line x1="36" y1="158" x2="300" y2="158" style="stroke: var(--color-border-light); stroke-width: 0.5px;"/>

                    <!-- X-axis labels: 6/4, 6/9, 6/14, 6/19, 6/24, 6/29, 7/3 -->
                    <text x="36" y="178" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: start;">6/4</text>
                    <text x="82" y="178" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">6/9</text>
                    <text x="128" y="178" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">6/14</text>
                    <text x="174" y="178" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">6/19</text>
                    <text x="220" y="178" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">6/24</text>
                    <text x="266" y="178" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">6/29</text>
                    <text x="300" y="178" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: end;">7/3</text>

                    <!-- Data: 82.5, 82.3, 82.1, 81.8, 82.0, 81.7, 81.5 -->
                    <!-- Y mapping: 83→38, 82→78, 81→118, 80→158 (each 1kg = 40px) -->
                    <!-- 82.5 → 58, 82.3 → 66, 82.1 → 74, 81.8 → 86, 82.0 → 78, 81.7 → 90, 81.5 → 98 -->

                    <!-- Polyline -->
                    <polyline points="36,58 82,66 128,74 174,86 220,78 266,90 300,98" style="fill: none; stroke: var(--color-training-main); stroke-width: 2.5px; stroke-linecap: round; stroke-linejoin: round;"/>

                    <!-- Data point markers -->
                    <circle cx="36" cy="58" r="4" style="fill: var(--color-training-main); stroke: var(--color-surface); stroke-width: 2px;"/>
                    <circle cx="82" cy="66" r="4" style="fill: var(--color-training-main); stroke: var(--color-surface); stroke-width: 2px;"/>
                    <circle cx="128" cy="74" r="4" style="fill: var(--color-training-main); stroke: var(--color-surface); stroke-width: 2px;"/>
                    <circle cx="174" cy="86" r="4" style="fill: var(--color-training-main); stroke: var(--color-surface); stroke-width: 2px;"/>
                    <circle cx="220" cy="78" r="4" style="fill: var(--color-training-main); stroke: var(--color-surface); stroke-width: 2px;"/>
                    <circle cx="266" cy="90" r="4" style="fill: var(--color-training-main); stroke: var(--color-surface); stroke-width: 2px;"/>
                    <circle cx="300" cy="98" r="4.5" style="fill: var(--color-training-main); stroke: var(--color-surface); stroke-width: 2px;"/>

                    <!-- Data value labels -->
                    <text x="36" y="48" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">82.5</text>
                    <text x="82" y="56" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">82.3</text>
                    <text x="128" y="64" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">82.1</text>
                    <text x="174" y="76" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">81.8</text>
                    <text x="220" y="68" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">82.0</text>
                    <text x="266" y="80" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary-light); text-anchor: middle;">81.7</text>
                    <text x="300" y="89" style="font-family: var(--font-mono); font-size: 9px; fill: var(--color-primary); font-weight: 600; text-anchor: middle;">81.5</text>
                </svg>
            </div>
        </section>

        <!-- Weight History List -->
        <section class="rounded-lg overflow-hidden mb-5" style="background:var(--color-surface); box-shadow:var(--shadow-card);" aria-label="历史记录">
            <h2 class="typography-subtitle px-4 pt-4 pb-1" style="font-size:var(--text-md);">历史记录</h2>

            <!-- 7月3日 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex items-center gap-3">
                    <span class="typography-caption whitespace-nowrap" style="font-family:var(--font-mono); color:var(--color-primary);">7月3日</span>
                    <span class="typography-data whitespace-nowrap" style="font-size:var(--text-base);">81.5kg</span>
                </div>
                <span class="whitespace-nowrap" style="font-family:var(--font-mono); font-size:var(--text-sm); font-weight:var(--font-weight-medium); color:var(--state-success);">&#8595; 0.5</span>
            </div>

            <!-- 7月1日 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex items-center gap-3">
                    <span class="typography-caption whitespace-nowrap" style="font-family:var(--font-mono); color:var(--color-primary);">7月1日</span>
                    <span class="typography-data whitespace-nowrap" style="font-size:var(--text-base);">82.0kg</span>
                </div>
                <span class="whitespace-nowrap" style="font-family:var(--font-mono); font-size:var(--text-sm); font-weight:var(--font-weight-medium); color:var(--state-warning);">&#8593; 0.2</span>
            </div>

            <!-- 6月29日 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex items-center gap-3">
                    <span class="typography-caption whitespace-nowrap" style="font-family:var(--font-mono); color:var(--color-primary);">6月29日</span>
                    <span class="typography-data whitespace-nowrap" style="font-size:var(--text-base);">81.8kg</span>
                </div>
                <span class="whitespace-nowrap" style="font-family:var(--font-mono); font-size:var(--text-sm); font-weight:var(--font-weight-medium); color:var(--state-success);">&#8595; 0.2</span>
            </div>

            <!-- 6月27日 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex items-center gap-3">
                    <span class="typography-caption whitespace-nowrap" style="font-family:var(--font-mono); color:var(--color-primary);">6月27日</span>
                    <span class="typography-data whitespace-nowrap" style="font-size:var(--text-base);">82.0kg</span>
                </div>
                <span class="whitespace-nowrap" style="font-family:var(--font-mono); font-size:var(--text-sm); font-weight:var(--font-weight-medium); color:var(--color-primary-light);">&mdash;</span>
            </div>

            <!-- 6月24日 -->
            <div class="flex items-center justify-between px-4 py-3">
                <div class="flex items-center gap-3">
                    <span class="typography-caption whitespace-nowrap" style="font-family:var(--font-mono); color:var(--color-primary);">6月24日</span>
                    <span class="typography-data whitespace-nowrap" style="font-size:var(--text-base);">82.1kg</span>
                </div>
                <span class="whitespace-nowrap" style="font-family:var(--font-mono); font-size:var(--text-sm); font-weight:var(--font-weight-medium); color:var(--state-success);">&#8595; 0.2</span>
            </div>

            <!-- View All Link -->
            <div class="px-4 py-3" style="border-top:1px solid var(--color-border-light);">
                <a href="#" class="typography-caption block text-center whitespace-nowrap" style="color:var(--color-training-main); font-size:var(--text-sm);">查看全部</a>
            </div>
        </section>

    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
