<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练日历</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */

:root {
  /* ── Brand Identity ── */
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;

  /* ── State Colors ── */
  --state-success: #30D158;
  --state-success-bg: rgba(48, 209, 88, 0.08);
  --state-warning: #FF9F0A;
  --state-warning-bg: rgba(255, 159, 10, 0.08);
  --state-error: #FF3B30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #0A84FF;
  --state-info-bg: rgba(10, 132, 255, 0.08);

  /* ── Accent (training-specific) ── */
  --color-training-main: #0A84FF;
  --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158;
  --color-training-rest: #86868B;

  /* ── Warmth Accent ── */
  --color-warm: #FF6B35;
  --color-warm-light: rgba(255, 107, 53, 0.10);

  /* ── Typography Scale ── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

  --text-xs: 0.6875rem;      /* 11px */
  --text-sm: 0.75rem;         /* 12px */
  --text-base: 0.875rem;      /* 14px */
  --text-md: 1rem;             /* 16px */
  --text-lg: 1.125rem;        /* 18px */
  --text-xl: 1.25rem;         /* 20px */
  --text-2xl: 1.5rem;         /* 24px */
  --text-3xl: 1.75rem;        /* 28px */
  --text-4xl: 2rem;           /* 32px */

  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Surface Depth (border-first, minimal shadow) ── */
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--color-border-light);

  /* ── Transition ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
}

/* ── Utility Classes ── */
.typography-hero {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-primary);
}

.typography-title {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.01em;
  color: var(--color-primary);
}

.typography-subtitle {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--font-weight-medium);
  line-height: var(--leading-tight);
  color: var(--color-primary);
}

.typography-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary);
}

.typography-caption {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary-light);
}

.typography-data {
  font-family: var(--font-mono);
  font-size: var(--text-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
}

.typography-data-lg {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

      <!-- Header -->

          <button class="inline-flex h-8 w-8 items-center justify-center rounded-md" style="color: var(--color-primary-light);" aria-label="上个月">

          </button>
          <h2 class="typography-subtitle" style="font-size: var(--text-md); font-weight: var(--font-weight-semibold); color: var(--color-primary);">2026年7月</h2>

            <i data-lucide="chevron-right" style="width:18px; height:18px;"></i>
          </button>
        </div>

        </div>
      </header>

      <!-- Week View (horizontal days row with frosted glass) -->

          <!-- Mon 30 (prev month) -->

            <span class="mt-1 truncate" style="font-size: var(--text-sm); color: var(--color-border); font-weight: var(--font-weight-medium);">30</span>

          <!-- Tue 1 -->

            <span class="truncate" style="font-size: var(--text-xs); color: var(--color-primary-light); line-height: 1;">Tu</span>

          </div>
          <!-- Wed 2 -->

            <span class="mt-1 truncate" style="font-size: var(--text-sm); color: var(--color-primary); font-weight: var(--font-weight-medium);">2</span>
          </div>
          <!-- Thu 3 (today) -->

            <span class="truncate" style="font-size: var(--text-xs); color: var(--color-training-main); line-height: 1; font-weight: var(--font-weight-semibold);">Th</span>
            <span class="mt-1 inline-flex h-7 w-7 items-center justify-center rounded-full" style="font-size: var(--text-sm); color: var(--color-surface); font-weight: var(--font-weight-bold); background: var(--color-training-main);">3</span>
            <span class="mt-0.5 h-1 w-1 rounded-full" style="background: var(--color-training-main);"></span>
          </div>
          <!-- Fri 4 -->

            <span class="mt-1 truncate" style="font-size: var(--text-sm); color: var(--color-primary); font-weight: var(--font-weight-medium);">4</span>
            <span class="mt-0.5 h-1 w-1 rounded-full" style="background: var(--color-primary-light);"></span>
          </div>
          <!-- Sat 5 -->
