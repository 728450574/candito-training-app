<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开始训练</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */

:root {
  /* ── Brand Identity ── */
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;

  /* ── State Colors ── */
  --state-success: #30D158;
  --state-success-bg: rgba(48, 209, 88, 0.08);
  --state-warning: #FF9F0A;
  --state-warning-bg: rgba(255, 159, 10, 0.08);
  --state-error: #FF3B30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #0A84FF;
  --state-info-bg: rgba(10, 132, 255, 0.08);

  /* ── Accent (training-specific) ── */
  --color-training-main: #0A84FF;
  --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158;
  --color-training-rest: #86868B;

  /* ── Warmth Accent ── */
  --color-warm: #FF6B35;
  --color-warm-light: rgba(255, 107, 53, 0.10);

  /* ── Typography Scale ── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

  --text-xs: 0.6875rem;      /* 11px */
  --text-sm: 0.75rem;         /* 12px */
  --text-base: 0.875rem;      /* 14px */
  --text-md: 1rem;             /* 16px */
  --text-lg: 1.125rem;        /* 18px */
  --text-xl: 1.25rem;         /* 20px */
  --text-2xl: 1.5rem;         /* 24px */
  --text-3xl: 1.75rem;        /* 28px */
  --text-4xl: 2rem;           /* 32px */

  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Surface Depth (border-first, minimal shadow) ── */
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--color-border-light);

  /* ── Transition ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
}

/* ── Utility Classes ── */
.typography-hero {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-primary);
}

.typography-title {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.01em;
  color: var(--color-primary);
}

.typography-subtitle {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--font-weight-medium);
  line-height: var(--leading-tight);
  color: var(--color-primary);
}

.typography-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary);
}

.typography-caption {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary-light);
}

.typography-data {
  font-family: var(--font-mono);
  font-size: var(--text-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
}

.typography-data-lg {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--color-surface);color:var(--color-primary);">
    <main class="flex flex-col items-center px-6 pb-6 pt-6 max-w-lg mx-auto min-h-screen" style="justify-content: space-between;">

        <!-- Branding Area -->
        <div class="flex flex-col items-center text-center w-full">
            <div class="flex items-center justify-center gap-2 mb-1" style="color:var(--color-training-main);">
                <svg width="32" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <rect x="2" y="14" width="8" height="20" rx="2" fill="currentColor" opacity="0.9"/>
                    <rect x="6" y="10" width="6" height="28" rx="2" fill="currentColor"/>
                    <rect x="36" y="14" width="8" height="20" rx="2" fill="currentColor" opacity="0.9"/>
                    <rect x="34" y="10" width="6" height="28" rx="2" fill="currentColor"/>
                    <rect x="12" y="20" width="24" height="8" rx="4" fill="currentColor"/>
                </svg>
                <h1 style="font-family: var(--font-sans); font-size: var(--text-2xl); font-weight: var(--font-weight-bold); color: var(--color-primary); letter-spacing: -0.02em;">Candito 训练助手</h1>
            </div>
            <p style="font-size: var(--text-sm); color: var(--color-primary-light); font-weight: var(--font-weight-medium);">6周力量训练计划 · 基于经典Candito6周计划</p>
        </div>

        <!-- 1RM Input Card -->
        <div class="w-full rounded-xl p-4" style="background:var(--color-surface);box-shadow:var(--shadow-elevated);border-radius:var(--radius-lg);">
            <div class="flex items-center justify-between mb-4">
                <h2 style="font-family: var(--font-sans); font-size: var(--text-md); font-weight: var(--font-weight-semibold); color: var(--color-primary);">输入你的 1RM</h2>
                <!-- Unit Selector (compact) -->
                <div class="flex rounded-md p-0.5" style="background:var(--color-surface-muted);">
                    <button class="px-3 py-1 rounded text-xs font-medium whitespace-nowrap" style="background:var(--color-surface);color:var(--color-primary);box-shadow:var(--shadow-card);">kg</button>
                    <button class="px-3 py-1 rounded text-xs font-medium whitespace-nowrap" style="color:var(--color-primary-light);">lb</button>
                </div>
            </div>

            <div class="flex flex-col gap-2.5">
                <div class="flex items-center justify-between">
                    <span style="font-size: var(--text-sm); font-weight: var(--font-weight-medium); color: var(--color-primary); min-width: 2.5rem;">深蹲</span>
                    <div class="flex-1 mx-3 flex items-center rounded-md px-3 h-10" style="background:var(--color-surface-muted);">
                        <input type="number" placeholder="100" class="w-full text-right bg-transparent outline-none" style="font-family:var(--font-mono);font-size:var(--text-md);font-weight:var(--font-weight-semibold);color:var(--color-primary);" inputmode="decimal" aria-label="深蹲1RM"/>
                        <span style="font-size:var(--text-xs);color:var(--color-primary-light);" class="ml-1 shrink-0">kg</span>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span style="font-size: var(--text-sm); font-weight: var(--font-weight-medium); color: var(--color-primary); min-width: 2.5rem;">卧推</span>
                    <div class="flex-1 mx-3 flex items-center rounded-md px-3 h-10" style="background:var(--color-surface-muted);">
                        <input type="number" placeholder="80" class="w-full text-right bg-transparent outline-none" style="font-family:var(--font-mono);font-size:var(--text-md);font-weight:var(--font-weight-semibold);color:var(--color-primary);" inputmode="decimal" aria-label="卧推1RM"/>
                        <span style="font-size:var(--text-xs);color:var(--color-primary-light);" class="ml-1 shrink-0">kg</span>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span style="font-size: var(--text-sm); font-weight: var(--font-weight-medium); color: var(--color-primary); min-width: 2.5rem;">硬拉</span>
                    <div class="flex-1 mx-3 flex items-center rounded-md px-3 h-10" style="background:var(--color-surface-muted);">
                        <input type="number" placeholder="120" class="w-full text-right bg-transparent outline-none" style="font-family:var(--font-mono);font-size:var(--text-md);font-weight:var(--font-weight-semibold);color:var(--color-primary);" inputmode="decimal" aria-label="硬拉1RM"/>
                        <span style="font-size:var(--text-xs);color:var(--color-primary-light);" class="ml-1 shrink-0">kg</span>
                    </div>
                </div>
            </div>
            <p style="font-size: var(--text-xs); color: var(--color-primary-light); margin-top: 8px;">不确定？可输入估算值，后续随时调整</p>
        </div>

        <!-- Start Date + CTA -->
        <div class="w-full">
            <div class="flex items-center gap-2 mb-4" style="color: var(--color-primary-light);">
                <i data-lucide="calendar" style="width: 14px; height: 14px;"></i>
                <span style="font-size: var(--text-xs); color: var(--color-primary-light);">开始日期</span>
                <span style="font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--font-weight-medium); color: var(--color-primary);">2026年7月3日</span>
            </div>
            <button data-dom-id="create-cycle" class="w-full flex items-center justify-center h-12 rounded-full font-semibold whitespace-nowrap" style="background:var(--color-training-main);color:var(--color-surface);border-radius:var(--radius-full);font-size:var(--text-md);font-weight:var(--font-weight-semibold);">
                创建训练周期
            </button>
        </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
