<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>休息日</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */
:root {
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;
  --state-success: #30D158; --state-success-bg: rgba(48,209,88,0.08);
  --state-warning: #FF9F0A; --state-warning-bg: rgba(255,159,10,0.08);
  --state-error: #FF3B30; --state-error-bg: rgba(255,59,48,0.08);
  --state-info: #0A84FF; --state-info-bg: rgba(10,132,255,0.08);
  --color-training-main: #0A84FF; --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158; --color-training-rest: #86868B;
  --color-warm: #FF6B35; --color-warm-light: rgba(255,107,53,0.10);
  --font-sans: -apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono: 'SF Mono','Menlo','Consolas',monospace;
  --text-xs: 0.6875rem; --text-sm: 0.75rem; --text-base: 0.875rem; --text-md: 1rem; --text-lg: 1.125rem; --text-xl: 1.25rem; --text-2xl: 1.5rem; --text-3xl: 1.75rem; --text-4xl: 2rem;
  --font-weight-regular: 400; --font-weight-medium: 500; --font-weight-semibold: 600; --font-weight-bold: 700;
  --leading-tight: 1.2; --leading-normal: 1.5; --leading-relaxed: 1.65;
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-full: 9999px;
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0,0,0,0.04),0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0,0,0,0.08),0 0 0 1px var(--color-border-light);
}
.typography-hero{font-family:var(--font-sans);font-size:var(--text-4xl);font-weight:var(--font-weight-bold);line-height:var(--leading-tight);letter-spacing:-0.02em;color:var(--color-primary)}
.typography-title{font-family:var(--font-sans);font-size:var(--text-2xl);font-weight:var(--font-weight-bold);line-height:var(--leading-tight);letter-spacing:-0.01em;color:var(--color-primary)}
.typography-subtitle{font-family:var(--font-sans);font-size:var(--text-lg);font-weight:var(--font-weight-medium);line-height:var(--leading-tight);color:var(--color-primary)}
.typography-body{font-family:var(--font-sans);font-size:var(--text-base);font-weight:var(--font-weight-regular);line-height:var(--leading-normal);color:var(--color-primary)}
.typography-caption{font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--font-weight-regular);line-height:var(--leading-normal);color:var(--color-primary-light)}
.typography-data{font-family:var(--font-mono);font-size:var(--text-md);font-weight:var(--font-weight-semibold);color:var(--color-primary)}
.typography-data-lg{font-family:var(--font-mono);font-size:var(--text-3xl);font-weight:var(--font-weight-bold);color:var(--color-primary);letter-spacing:-0.02em}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline { --color-primary: var(--color-primary); --color-border: var(--color-border); }
  @layer base { body { background: var(--color-surface); color: var(--color-foreground); } td,th { word-break: break-all; word-break: auto-phrase; } th { white-space: nowrap; } }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-[100px] max-w-lg mx-auto px-4">
        <div class="h-11"></div>
        <section class="px-5 pt-2 pb-6">
            <p class="typography-caption">7月4日 周五</p>
            <h1 class="typography-title mt-1">今天是休息日</h1>
            <p class="typography-caption mt-1.5" style="color: var(--color-primary-light);">充分休息，为下次训练做好准备</p>
        </section>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
