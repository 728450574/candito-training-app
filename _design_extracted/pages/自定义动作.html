<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义动作</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */

:root {
  /* ── Brand Identity ── */
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;

  /* ── State Colors ── */
  --state-success: #30D158;
  --state-success-bg: rgba(48, 209, 88, 0.08);
  --state-warning: #FF9F0A;
  --state-warning-bg: rgba(255, 159, 10, 0.08);
  --state-error: #FF3B30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #0A84FF;
  --state-info-bg: rgba(10, 132, 255, 0.08);

  /* ── Accent (training-specific) ── */
  --color-training-main: #0A84FF;
  --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158;
  --color-training-rest: #86868B;

  /* ── Warmth Accent ── */
  --color-warm: #FF6B35;
  --color-warm-light: rgba(255, 107, 53, 0.10);

  /* ── Typography Scale ── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

  --text-xs: 0.6875rem;      /* 11px */
  --text-sm: 0.75rem;         /* 12px */
  --text-base: 0.875rem;      /* 14px */
  --text-md: 1rem;             /* 16px */
  --text-lg: 1.125rem;        /* 18px */
  --text-xl: 1.25rem;         /* 20px */
  --text-2xl: 1.5rem;         /* 24px */
  --text-3xl: 1.75rem;        /* 28px */
  --text-4xl: 2rem;           /* 32px */

  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Surface Depth (border-first, minimal shadow) ── */
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--color-border-light);

  /* ── Transition ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
}

/* ── Utility Classes ── */
.typography-hero {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-primary);
}

.typography-title {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.01em;
  color: var(--color-primary);
}

.typography-subtitle {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--font-weight-medium);
  line-height: var(--leading-tight);
  color: var(--color-primary);
}

.typography-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary);
}

.typography-caption {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary-light);
}

.typography-data {
  font-family: var(--font-mono);
  font-size: var(--text-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
}

.typography-data-lg {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-8 max-w-lg mx-auto px-4">

      <!-- Top Navigation Bar -->
      <header class="sticky top-0 z-30 flex h-11 items-center justify-between border-b px-4" style="background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-color: var(--color-border);">
        <button data-dom-id="back-setup" class="flex h-9 w-9 items-center justify-center" style="border-radius: var(--radius-md);" aria-label="返回">
          <i data-lucide="chevron-left" class="h-5 w-5" style="color: var(--color-primary);"></i>
        </button>
        <h1 class="text-base font-semibold tracking-tight" style="color: var(--color-primary); font-family: var(--font-sans);">自定义辅助训练</h1>
        <div class="w-9"></div>
      </header>

      <div class="px-4 pt-5">

        <!-- Exercise Type Selection -->
        <section class="mb-5">
          <p class="mb-2.5 text-xs font-medium" style="color: var(--color-primary-light);">为哪个位置添加自定义动作</p>
          <div class="flex flex-col gap-2" style="box-shadow: var(--shadow-card); border-radius: var(--radius-lg); overflow: hidden;">

            <!-- Option 1: Selected -->
            <div class="flex items-center gap-3 px-3.5 py-3" style="background: var(--state-info-bg); border-left: 3px solid var(--color-training-main);">
              <div class="flex h-4 w-4 shrink-0 items-center justify-center">
                <div class="h-2.5 w-2.5 rounded-full" style="background: var(--color-training-main);"></div>
              </div>
              <div class="min-w-0 flex-1">
                <p class="text-sm font-medium truncate" style="color: var(--color-primary);">上背部 #1 (水平拉举)</p>
                <p class="text-xs" style="color: var(--color-primary-light);">Back Row</p>
              </div>
            </div>

            <!-- Option 2: Unselected -->
            <div class="flex items-center gap-3 px-3.5 py-3" style="background: var(--color-surface); border-bottom: 0.5px solid var(--color-border-light);">
              <div class="flex h-4 w-4 shrink-0 items-center justify-center">
                <div class="h-2.5 w-2.5 rounded-full" style="border: 1.5px solid var(--color-border);"></div>
              </div>
              <div class="min-w-0 flex-1">
                <p class="text-sm font-medium truncate" style="color: var(--color-primary);">肩部训练</p>
                <p class="text-xs" style="color: var(--color-primary-light);">Shoulder</p>
              </div>
            </div>

            <!-- Option 3: Unselected -->
            <div class="flex items-center gap-3 px-3.5 py-3" style="background: var(--color-surface);">
              <div class="flex h-4 w-4 shrink-0 items-center justify-center">
                <div class="h-2.5 w-2.5 rounded-full" style="border: 1.5px solid var(--color-border);"></div>
              </div>
              <div class="min-w-0 flex-1">
                <p class="text-sm font-medium truncate" style="color: var(--color-primary);">上背部 #2 (垂直拉举)</p>
                <p class="text-xs" style="color: var(--color-primary-light);">Vertical Pull</p>
              </div>
            </div>

          </div>
        </section>

        <!-- Custom Name Input -->
        <section class="mb-5">
          <label class="mb-2 block text-xs font-medium" style="color: var(--color-primary-light);">动作名称</label>
          <div class="pb-1" style="border-bottom: 1.5px solid var(--color-border);">
            <input
              type="text"
              placeholder="输入自定义动作名称，如：T杠划船"
              class="w-full bg-transparent py-2.5 text-lg font-medium tracking-tight outline-none placeholder:font-normal"
              style="color: var(--color-primary); font-family: var(--font-sans); font-size: var(--text-lg);"
            >
          </div>
        </section>

        <!-- Preset Suggestions -->
        <section class="mb-5">
          <p class="mb-2.5 text-xs" style="color: var(--color-primary-light);">推荐选择</p>
          <div class="flex flex-nowrap gap-2 overflow-x-auto no-scrollbar pb-1">
            <button class="shrink-0 px-3.5 py-2 text-sm font-medium whitespace-nowrap" style="background: var(--color-surface-muted); color: var(--color-primary); border-radius: var(--radius-full); border: 0.5px solid var(--color-border-light); transition: all var(--duration-fast) var(--ease-default);">T杠划船</button>
            <button class="shrink-0 px-3.5 py-2 text-sm font-medium whitespace-nowrap" style="background: var(--color-surface-muted); color: var(--color-primary); border-radius: var(--radius-full); border: 0.5px solid var(--color-border-light); transition: all var(--duration-fast) var(--ease-default);">单臂哑铃划船</button>
            <button class="shrink-0 px-3.5 py-2 text-sm font-medium whitespace-nowrap" style="background: var(--color-surface-muted); color: var(--color-primary); border-radius: var(--radius-full); border: 0.5px solid var(--color-border-light); transition: all var(--duration-fast) var(--ease-default);">绳索面拉</button>
            <button class="shrink-0 px-3.5 py-2 text-sm font-medium whitespace-nowrap" style="background: var(--color-surface-muted); color: var(--color-primary); border-radius: var(--radius-full); border: 0.5px solid var(--color-border-light); transition: all var(--duration-fast) var(--ease-default);">杠铃俯身划船</button>
          </div>
        </section>

        <!-- Default Sets Config -->
        <section class="mb-8">
          <p class="mb-2.5 text-xs font-medium" style="color: var(--color-primary-light);">默认组数配置</p>
          <div class="rounded-xl p-4" style="background: var(--color-surface); box-shadow: var(--shadow-elevated);">
            <div class="flex items-center justify-between">
              <!-- Sets -->
              <div class="flex items-center gap-3">
                <span class="text-sm" style="color: var(--color-primary);">组数</span>
                <div class="flex h-8 w-12 items-center justify-center" style="background: var(--color-surface-muted); border-radius: var(--radius-md);">
                  <span class="text-sm font-semibold" style="color: var(--color-primary); font-family: var(--font-mono);">3</span>
                </div>
                <span class="text-sm" style="color: var(--color-primary-light);">组</span>
              </div>
              <!-- Divider -->
              <div class="h-5 w-px" style="background: var(--color-border-light);"></div>
              <!-- Reps -->
              <div class="flex items-center gap-3">
                <span class="text-sm" style="color: var(--color-primary);">次数</span>
                <div class="flex h-8 w-12 items-center justify-center" style="background: var(--color-surface-muted); border-radius: var(--radius-md);">
                  <span class="text-sm font-semibold" style="color: var(--color-primary); font-family: var(--font-mono);">10</span>
                </div>
                <span class="text-sm" style="color: var(--color-primary-light);">次</span>
              </div>
            </div>
            <p class="mt-2.5 text-xs" style="color: var(--color-primary-light);">训练时可随时调整</p>
          </div>
        </section>

        <!-- Action Buttons -->
        <section>
          <button data-dom-id="add-exercise" class="flex w-full items-center justify-center py-3.5 text-base font-semibold" style="background: var(--color-training-main); color: var(--color-surface); border-radius: var(--radius-full); transition: opacity var(--duration-fast) var(--ease-default);">
            添加动作
          </button>
          <div class="mt-4 flex justify-center">
            <button class="text-sm font-medium" style="color: var(--color-primary-light);">取消</button>
          </div>
        </section>

      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
