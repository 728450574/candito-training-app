<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进度统计</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */

:root {
  /* ── Brand Identity ── */
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;

  /* ── State Colors ── */
  --state-success: #30D158;
  --state-success-bg: rgba(48, 209, 88, 0.08);
  --state-warning: #FF9F0A;
  --state-warning-bg: rgba(255, 159, 10, 0.08);
  --state-error: #FF3B30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #0A84FF;
  --state-info-bg: rgba(10, 132, 255, 0.08);

  /* ── Accent (training-specific) ── */
  --color-training-main: #0A84FF;
  --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158;
  --color-training-rest: #86868B;

  /* ── Warmth Accent ── */
  --color-warm: #FF6B35;
  --color-warm-light: rgba(255, 107, 53, 0.10);

  /* ── Typography Scale ── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

  --text-xs: 0.6875rem;      /* 11px */
  --text-sm: 0.75rem;         /* 12px */
  --text-base: 0.875rem;      /* 14px */
  --text-md: 1rem;             /* 16px */
  --text-lg: 1.125rem;        /* 18px */
  --text-xl: 1.25rem;         /* 20px */
  --text-2xl: 1.5rem;         /* 24px */
  --text-3xl: 1.75rem;        /* 28px */
  --text-4xl: 2rem;           /* 32px */

  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Surface Depth (border-first, minimal shadow) ── */
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--color-border-light);

  /* ── Transition ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
}

/* ── Utility Classes ── */
.typography-hero {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-primary);
}

.typography-title {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.01em;
  color: var(--color-primary);
}

.typography-subtitle {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--font-weight-medium);
  line-height: var(--leading-tight);
  color: var(--color-primary);
}

.typography-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary);
}

.typography-caption {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary-light);
}

.typography-data {
  font-family: var(--font-mono);
  font-size: var(--text-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
}

.typography-data-lg {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-24 px-4 pt-3 max-w-lg mx-auto">

        <!-- Header -->
        <header class="flex items-center justify-between mb-5">
            <h1 class="typography-title">进度统计</h1>
            <span class="typography-caption">第 2 周期</span>
        </header>

        <!-- Period Selector -->
        <nav class="flex rounded-lg p-0.5 mb-5" style="background:var(--color-surface-muted);" aria-label="时间筛选">
            <button class="flex-1 py-2 text-center text-sm font-medium rounded-md transition-all duration-200" style="background:var(--color-surface); box-shadow:var(--shadow-card); color:var(--color-primary);">本周期</button>
            <button class="flex-1 py-2 text-center text-sm font-medium rounded-md transition-all duration-200" style="color:var(--color-primary-light);">历史</button>
            <button class="flex-1 py-2 text-center text-sm font-medium rounded-md transition-all duration-200" style="color:var(--color-primary-light);">全部</button>
        </nav>

            <!-- Tab description -->
            <p class="text-center" style="font-size: var(--text-xs); color: var(--color-primary-light); margin-top: 6px;">本周期 = 当前6周汇总 | 历史 = 已完成周期列表 | 全部 = 跨周期趋势</p>

        <!-- Summary Cards -->
        <section class="flex gap-2.5 mb-5" aria-label="训练概览">
            <!-- 总训练 -->
            <div class="flex-1 rounded-lg p-3" style="background:var(--color-surface-muted);">
                <span class="typography-caption block mb-1">总训练</span>
                <span class="typography-data-lg whitespace-nowrap">12</span>
                <span class="typography-caption">次</span>
            </div>
            <!-- 总容量 -->
            <div class="flex-1 rounded-lg p-3" style="background:var(--color-surface-muted);">
                <span class="typography-caption block mb-1">总容量</span>
                <span class="typography-data whitespace-nowrap">48,520</span>
                <span class="typography-caption">kg</span>
            </div>
            <!-- 平均感受 -->
            <div class="flex-1 rounded-lg p-3" style="background:var(--color-surface-muted);">
                <span class="typography-caption block mb-1">平均感受</span>
                <div class="flex items-baseline gap-1">
                    <span class="typography-data whitespace-nowrap">4.2</span>
                    <div class="flex items-center" style="color:var(--state-warning); font-size:10px; line-height:1;">
                        <svg width="48" height="10" viewBox="0 0 48 10" fill="none" aria-label="4.2星评分">
                            <polygon points="5,0 6.4,3.5 10,3.8 7.4,6.2 8.2,9.8 5,8 1.8,9.8 2.6,6.2 0,3.8 3.6,3.5" fill="var(--state-warning)"/>
                            <polygon points="15,0 16.4,3.5 20,3.8 17.4,6.2 18.2,9.8 15,8 11.8,9.8 12.6,6.2 10,3.8 13.6,3.5" fill="var(--state-warning)"/>
                            <polygon points="25,0 26.4,3.5 30,3.8 27.4,6.2 28.2,9.8 25,8 21.8,9.8 22.6,6.2 20,3.8 23.6,3.5" fill="var(--state-warning)"/>
                            <polygon points="35,0 36.4,3.5 40,3.8 37.4,6.2 38.2,9.8 35,8 31.8,9.8 32.6,6.2 30,3.8 33.6,3.5" fill="var(--state-warning)"/>
                            <polygon points="45,0 46.4,3.5 50,3.8 47.4,6.2 48.2,9.8 45,8 41.8,9.8 42.6,6.2 40,3.8 43.6,3.5" fill="var(--state-warning)" opacity="0.2"/>
                        </svg>
                    </div>
                </div>
            </div>
        </section>

        <!-- 1RM Trend Chart -->
        <section class="rounded-lg p-4 mb-5" style="background:var(--color-surface); box-shadow:var(--shadow-card);" aria-label="1RM趋势图">
            <div class="flex items-center justify-between mb-4">
                <h2 class="typography-subtitle">跨周期 1RM 趋势</h2>
                <span class="typography-caption">单位: kg</span>
            </div>

            <!-- Legend -->
            <div class="flex gap-4 mb-3">
                <div class="flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full inline-block" style="background:var(--color-training-main);"></span>
                    <span class="typography-caption">深蹲</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full inline-block" style="background:var(--color-training-assist);"></span>
                    <span class="typography-caption">卧推</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full inline-block" style="background:var(--color-warm);"></span>
                    <span class="typography-caption">硬拉</span>
                </div>
            </div>

            <!-- SVG Chart -->
            <div class="relative" style="aspect-ratio:16/10;">
                <svg viewBox="0 0 320 200" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" aria-label="1RM趋势折线图">
                    <defs>
                        <!-- Gradient fills beneath lines -->
                        <linearGradient id="grad-squat" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.15"/>
                            <stop offset="100%" stop-color="#0A84FF" stop-opacity="0.01"/>
                        </linearGradient>
                        <linearGradient id="grad-bench" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#5E5CE6" stop-opacity="0.12"/>
                            <stop offset="100%" stop-color="#5E5CE6" stop-opacity="0.01"/>
                        </linearGradient>
                        <linearGradient id="grad-deadlift" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.12"/>
                            <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.01"/>
                        </linearGradient>
                    </defs>

                    <!-- Y-axis labels -->
                    <text x="28" y="22" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="end">120</text>
                    <text x="28" y="62" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="end">110</text>
                    <text x="28" y="102" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="end">100</text>
                    <text x="28" y="142" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="end">90</text>
                    <text x="28" y="178" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="end">80</text>

                    <!-- Grid lines (horizontal) -->
                    <line x1="36" y1="18" x2="300" y2="18" stroke="var(--color-border-light)" stroke-width="0.5"/>
                    <line x1="36" y1="58" x2="300" y2="58" stroke="var(--color-border-light)" stroke-width="0.5"/>
                    <line x1="36" y1="98" x2="300" y2="98" stroke="var(--color-border-light)" stroke-width="0.5"/>
                    <line x1="36" y1="138" x2="300" y2="138" stroke="var(--color-border-light)" stroke-width="0.5"/>
                    <line x1="36" y1="174" x2="300" y2="174" stroke="var(--color-border-light)" stroke-width="0.5"/>

                    <!-- X-axis labels -->
                    <text x="68" y="178" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="middle">C1</text>
                    <text x="121" y="178" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="middle">C2</text>
                    <text x="174" y="178" font-family="var(--font-mono)" font-size="10" fill="var(--color-primary-light)" text-anchor="middle">C3</text>

                    <!-- Area fills (gradient beneath lines) -->
                    <!-- Squat area: 90, 100, 100 → y: 135, 96, 96 -->
                    <polygon points="68,135 121,96 174,96 174,174 68,174" fill="url(#grad-squat)"/>
                    <!-- Bench area: 75→80, 85, 85 → y: 174, 135, 135 -->
                    <polygon points="68,174 121,135 174,135 174,174 68,174" fill="url(#grad-bench)"/>
                    <!-- Deadlift area: 110, 120, 120 → y: 57, 18, 18 -->
                    <polygon points="68,57 121,18 174,18 174,174 68,174" fill="url(#grad-deadlift)"/>

                    <!-- Lines -->
                    <!-- Squat: 深蹲 blue -->
                    <polyline points="68,135 121,96 174,96" fill="none" stroke="#0A84FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- Bench: 卧推 purple -->
                    <polyline points="68,174 121,135 174,135" fill="none" stroke="#5E5CE6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- Deadlift: 硬拉 orange -->
                    <polyline points="68,57 121,18 174,18" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

                    <!-- Data points - Squat (blue) -->
                    <circle cx="68" cy="135" r="4.5" fill="#0A84FF" stroke="var(--color-surface)" stroke-width="2"/>
                    <circle cx="121" cy="96" r="4.5" fill="#0A84FF" stroke="var(--color-surface)" stroke-width="2"/>
                    <circle cx="174" cy="96" r="4.5" fill="#0A84FF" stroke="var(--color-surface)" stroke-width="2"/>

                    <!-- Data points - Bench (purple) -->
                    <circle cx="68" cy="174" r="4.5" fill="#5E5CE6" stroke="var(--color-surface)" stroke-width="2"/>
                    <circle cx="121" cy="135" r="4.5" fill="#5E5CE6" stroke="var(--color-surface)" stroke-width="2"/>
                    <circle cx="174" cy="135" r="4.5" fill="#5E5CE6" stroke="var(--color-surface)" stroke-width="2"/>

                    <!-- Data points - Deadlift (orange) -->
                    <circle cx="68" cy="57" r="4.5" fill="#FF6B35" stroke="var(--color-surface)" stroke-width="2"/>
                    <circle cx="121" cy="18" r="4.5" fill="#FF6B35" stroke="var(--color-surface)" stroke-width="2"/>
                    <circle cx="174" cy="18" r="4.5" fill="#FF6B35" stroke="var(--color-surface)" stroke-width="2"/>
                </svg>
            </div>
        </section>

        <!-- Weekly Breakdown -->
        <section class="rounded-lg mb-5 overflow-hidden" style="background:var(--color-surface); box-shadow:var(--shadow-card);" aria-label="每周完成情况">
            <h2 class="typography-subtitle px-4 pt-4 pb-2">每周完成</h2>

            <!-- Week 1 -->
            <div class="flex items-center gap-3 px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-sm font-medium" style="color:var(--color-primary);">第 1 周</span>
                        <span class="typography-caption">4/5</span>
                    </div>
                    <div class="w-full h-1.5 rounded-full overflow-hidden" style="background:var(--color-surface-muted);">
                        <div class="h-full rounded-full" style="width:80%; background:var(--state-success);"></div>
                    </div>
                </div>
                <div class="flex gap-1 shrink-0">
                    <i data-lucide="dumbbell" class="w-3.5 h-3.5" style="color:var(--color-training-main);"></i>
                    <i data-lucide="dumbbell" class="w-3.5 h-3.5" style="color:var(--color-training-assist);"></i>
                    <i data-lucide="dumbbell" class="w-3.5 h-3.5" style="color:var(--color-warm);"></i>
                </div>
            </div>

            <!-- Week 2 -->
            <div class="flex items-center gap-3 px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1.5">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium" style="color:var(--color-primary);">第 2 周</span>
                            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium" style="background:var(--state-info-bg); color:var(--state-info);">进行中</span>
                        </div>
                        <span class="typography-caption">2/4</span>
                    </div>
                    <div class="w-full h-1.5 rounded-full overflow-hidden" style="background:var(--color-surface-muted);">
                        <div class="h-full rounded-full" style="width:50%; background:var(--state-info);"></div>
                    </div>
                </div>
                <div class="flex gap-1 shrink-0">
                    <i data-lucide="dumbbell" class="w-3.5 h-3.5" style="color:var(--color-training-main);"></i>
                    <i data-lucide="dumbbell" class="w-3.5 h-3.5" style="color:var(--color-training-assist);"></i>
                </div>
            </div>

            <!-- Week 3 -->
            <div class="flex items-center gap-3 px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-sm font-medium" style="color:var(--color-primary);">第 3 周</span>
                        <span class="typography-caption">0/5</span>
                    </div>
                    <div class="w-full h-1.5 rounded-full overflow-hidden" style="background:var(--color-surface-muted);">
                        <div class="h-full rounded-full" style="width:0%; background:var(--state-success);"></div>
                    </div>
                </div>
                <div class="flex gap-1 shrink-0">
                    <span class="typography-caption text-xs">未开始</span>
                </div>
            </div>

            <!-- Week 4 -->
            <div class="flex items-center gap-3 px-4 py-3" style="border-bottom:1px solid var(--color-border-light);">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-sm font-medium" style="color:var(--color-primary);">第 4 周</span>
                        <span class="typography-caption">0/5</span>
                    </div>
                    <div class="w-full h-1.5 rounded-full overflow-hidden" style="background:var(--color-surface-muted);">
                        <div class="h-full rounded-full" style="width:0%; background:var(--state-success);"></div>
                    </div>
                </div>
                <div class="flex gap-1 shrink-0">
                    <span class="typography-caption text-xs">未开始</span>
                </div>
            </div>

            <!-- Week 5 -->
            <div class="flex items-center gap-3 px-4 py-3">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-sm font-medium" style="color:var(--color-primary);">第 5 周</span>
                        <span class="typography-caption">0/5</span>
                    </div>
                    <div class="w-full h-1.5 rounded-full overflow-hidden" style="background:var(--color-surface-muted);">
                        <div class="h-full rounded-full" style="width:0%; background:var(--state-success);"></div>
                    </div>
                </div>
                <div class="flex gap-1 shrink-0">
                    <span class="typography-caption text-xs">未开始</span>
                </div>
            </div>
        </section>

        <!-- Body Weight Trend -->
        <section class="rounded-lg p-4 mb-5" style="background:var(--color-surface); box-shadow:var(--shadow-card);" aria-label="体重记录">
            <div class="flex items-center justify-between mb-3">
                <h2 class="typography-subtitle">体重记录</h2>
                <span class="typography-caption">kg</span>
            </div>

            <!-- Sparkline -->
            <div class="mb-2">
                <svg viewBox="0 0 300 60" width="100%" height="60" preserveAspectRatio="xMidYMid meet" aria-label="体重趋势迷你图">
                    <defs>
                        <linearGradient id="grad-weight" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="var(--color-training-main)" stop-opacity="0.10"/>
                            <stop offset="100%" stop-color="var(--color-training-main)" stop-opacity="0.01"/>
                        </linearGradient>
                    </defs>
                    <!-- Area -->
                    <polygon points="30,8 108,14 186,20 264,36 264,55 30,55" fill="url(#grad-weight)"/>
                    <!-- Line -->
                    <polyline points="30,8 108,14 186,20 264,36" fill="none" stroke="var(--color-training-main)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- Points -->
                    <circle cx="30" cy="8" r="3" fill="var(--color-training-main)" stroke="var(--color-surface)" stroke-width="1.5"/>
                    <circle cx="108" cy="14" r="3" fill="var(--color-training-main)" stroke="var(--color-surface)" stroke-width="1.5"/>
                    <circle cx="186" cy="20" r="3" fill="var(--color-training-main)" stroke="var(--color-surface)" stroke-width="1.5"/>
                    <circle cx="264" cy="36" r="3.5" fill="var(--color-training-main)" stroke="var(--color-surface)" stroke-width="2"/>
                    <!-- Labels -->
                    <text x="30" y="5" font-family="var(--font-mono)" font-size="9" fill="var(--color-primary-light)" text-anchor="middle">82.5</text>
                    <text x="108" y="11" font-family="var(--font-mono)" font-size="9" fill="var(--color-primary-light)" text-anchor="middle">82.3</text>
                    <text x="186" y="17" font-family="var(--font-mono)" font-size="9" fill="var(--color-primary-light)" text-anchor="middle">82.1</text>

            <div class="flex justify-center mt-3">
                <button data-dom-id="goto-weight" class="inline-flex items-center gap-1.5 px-4 py-2" style="font-size: var(--text-sm); font-weight: var(--font-weight-medium); color: var(--color-training-main); background: var(--state-info-bg); border-radius: var(--radius-full);">
                    <i data-lucide="scale" style="width: 14px; height: 14px;"></i>

    </main>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 inset-x-0 z-30 border-t" style="background: rgba(255,255,255,0.88); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-color: var(--color-border-light);">
        <div class="flex items-center justify-around pt-2 pb-6 max-w-lg mx-auto" style="padding-bottom: calc(0.375rem + env(safe-area-inset-bottom, 0px));">
            <!-- 今日 -->
            <button class="flex flex-col items-center gap-0.5 min-w-[56px]" aria-label="今日" data-dom-id="nav-today" style="color: var(--color-primary-light);">
                <i data-lucide="dumbbell" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium" style="font-family: var(--font-sans);">今日</span>

            <button class="flex flex-col items-center gap-0.5 min-w-[56px]" aria-label="日历" data-dom-id="nav-calendar" style="color: var(--color-primary-light);">

                <span class="text-[10px] font-medium" style="font-family: var(--font-sans);">日历</span>

            <!-- 统计 -->
            <button class="flex flex-col items-center gap-0.5 min-w-[56px]" aria-label="统计" data-dom-id="nav-stats" style="color: var(--color-training-main);">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium" style="font-family: var(--font-sans); font-weight: var(--font-weight-semibold);">统计</span>
            </button>
            <!-- 设置 -->
            <button class="flex flex-col items-center gap-0.5 min-w-[56px]" aria-label="设置" data-dom-id="nav-settings" style="color: var(--color-primary-light);">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium" style="font-family: var(--font-sans);">设置</span>
            </button>
        </div>
    </nav>
    <style>
    /* Progress bar fill animation */
    @keyframes progress-fill {
        from { width: 0%; }
    }
    [style*="width:80%"],
    [style*="width:50%"] {
        animation: progress-fill 0.8s var(--ease-default) both;
    }
    /* Segmented control transition */
    nav[aria-label="时间筛选"] button {
        transition: all 0.2s var(--ease-default);
    }
    </style>
