<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练完成</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */

:root {
  /* ── Brand Identity ── */
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;

  /* ── State Colors ── */
  --state-success: #30D158;
  --state-success-bg: rgba(48, 209, 88, 0.08);
  --state-warning: #FF9F0A;
  --state-warning-bg: rgba(255, 159, 10, 0.08);
  --state-error: #FF3B30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #0A84FF;
  --state-info-bg: rgba(10, 132, 255, 0.08);

  /* ── Accent (training-specific) ── */
  --color-training-main: #0A84FF;
  --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158;
  --color-training-rest: #86868B;

  /* ── Warmth Accent ── */
  --color-warm: #FF6B35;
  --color-warm-light: rgba(255, 107, 53, 0.10);

  /* ── Typography Scale ── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

  --text-xs: 0.6875rem;      /* 11px */
  --text-sm: 0.75rem;         /* 12px */
  --text-base: 0.875rem;      /* 14px */
  --text-md: 1rem;             /* 16px */
  --text-lg: 1.125rem;        /* 18px */
  --text-xl: 1.25rem;         /* 20px */
  --text-2xl: 1.5rem;         /* 24px */
  --text-3xl: 1.75rem;        /* 28px */
  --text-4xl: 2rem;           /* 32px */

  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Surface Depth (border-first, minimal shadow) ── */
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--color-border-light);

  /* ── Transition ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
}

/* ── Utility Classes ── */
.typography-hero {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-primary);
}

.typography-title {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.01em;
  color: var(--color-primary);
}

.typography-subtitle {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--font-weight-medium);
  line-height: var(--leading-tight);
  color: var(--color-primary);
}

.typography-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary);
}

.typography-caption {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary-light);
}

.typography-data {
  font-family: var(--font-mono);
  font-size: var(--text-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
}

.typography-data-lg {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-24 px-4 pt-8 max-w-lg mx-auto">

        <!-- ── Completion Header ── -->
        <section class="flex flex-col items-center pt-4 pb-6" aria-label="训练完成">
            <!-- Green checkmark circle -->
            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4" style="background: var(--state-success);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1 class="typography-hero text-center" style="text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">训练完成！</h1>
            <p class="typography-caption mt-2 text-center">下肢训练 · W2D1 · 52分钟</p>
        </section>

        <!-- ── Training Summary Card ── -->
        <section class="rounded-xl p-4 mb-4" style="background: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="训练摘要">
            <h2 class="typography-subtitle mb-3">本次训练</h2>

            <!-- Squat — main lift with set details -->
            <div class="mb-3">
                <div class="flex items-center justify-between mb-1.5">
                    <span class="typography-body font-semibold">深蹲</span>
                    <span class="typography-caption" style="color: var(--state-success);">4组 完成</span>
                </div>
                <div class="space-y-1.5 pl-1">
                    <!-- Set 1 -->
                    <div class="flex items-center justify-between text-xs" style="font-family: var(--font-mono); color: var(--color-primary);">
                        <span class="opacity-50">S1</span>
                        <span>80kg × 6次</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--state-success)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <!-- Set 2 -->
                    <div class="flex items-center justify-between text-xs" style="font-family: var(--font-mono); color: var(--color-primary);">
                        <span class="opacity-50">S2</span>
                        <span>80kg × 6次</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--state-success)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <!-- Set 3 — amber/warning fewer reps -->
                    <div class="flex items-center justify-between text-xs" style="font-family: var(--font-mono); color: var(--state-warning);">
                        <span class="opacity-70">S3</span>
                        <span>80kg × 5次</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--state-warning)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    </div>
                    <!-- Set 4 -->
                    <div class="flex items-center justify-between text-xs" style="font-family: var(--font-mono); color: var(--color-primary);">
                        <span class="opacity-50">S4</span>
                        <span>80kg × 6次</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--state-success)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                </div>
            </div>

            <!-- Divider -->
            <div class="h-px mb-3" style="background: var(--color-border-light);"></div>

            <!-- Deadlift variant — simple row -->
            <div class="flex items-center justify-between mb-3">
                <span class="typography-body font-semibold">硬拉变式</span>
                <span class="typography-caption" style="color: var(--state-success);">2组 完成</span>
            </div>

            <!-- Divider -->
            <div class="h-px mb-3" style="background: var(--color-border-light);"></div>

            <!-- Seated DB press — assistance, gray -->
            <div class="flex items-center justify-between">
                <span class="typography-body" style="color: var(--color-primary-light);">坐姿哑铃推举</span>
                <span class="typography-caption" style="color: var(--color-primary-light);">3组 完成</span>
            </div>
        </section>

        <!-- ── Stats Summary (3 metrics) ── -->
        <section class="grid grid-cols-3 gap-2 mb-4" aria-label="训练统计">
            <div class="rounded-xl p-3 text-center" style="background: var(--color-surface-muted);">
                <div class="typography-data-lg" style="font-size: 1.125rem;">4,680</div>
                <div class="typography-caption mt-0.5">总容量 kg</div>
            </div>
            <div class="rounded-xl p-3 text-center" style="background: var(--color-surface-muted);">
                <div class="typography-data-lg" style="font-size: 1.125rem;">52</div>
                <div class="typography-caption mt-0.5">时长 分钟</div>
            </div>
            <div class="rounded-xl p-3 text-center" style="background: var(--color-surface-muted);">
                <div class="typography-data-lg" style="font-size: 1.125rem;">88</div>
                <div class="typography-caption mt-0.5">平均休息 秒</div>
            </div>
        </section>

        <!-- ── MR10 Special Notice ── -->
        <section class="rounded-xl p-4 mb-4" style="background: var(--state-info-bg); box-shadow: var(--shadow-card);" aria-label="MR10 提示">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-0.5" style="background: var(--state-info);">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                </div>
                <div>
                    <p class="typography-body font-semibold" style="color: var(--state-info);">深蹲 MR10 完成 9次</p>
                    <p class="typography-caption mt-1">下次训练将进行 8组 × 3次 减量组</p>
                </div>
            </div>
        </section>

        <!-- ── Body Weight Record ── -->
        <section class="rounded-xl p-4 mb-4" style="background: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="体重记录">
            <h2 class="typography-subtitle mb-3">记录今日体重</h2>
            <div class="flex items-center gap-3">
                <div class="flex-1 flex items-center rounded-lg px-3 h-10" style="background: var(--color-surface-muted); border: 1px solid var(--color-border-light);">
                    <input type="number" value="81.5" step="0.1" inputmode="decimal" class="flex-1 bg-transparent outline-none typography-data" style="font-size: var(--text-lg);" aria-label="体重">
                </div>
                <span class="typography-caption shrink-0">kg</span>
            </div>
            <p class="typography-caption mt-2" style="font-size: var(--text-xs);">选填，帮助追踪体重变化趋势</p>
        </section>

        <!-- ── Training Notes ── -->
        <section class="rounded-xl p-4 mb-4" style="background: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="训练笔记">
            <h2 class="typography-subtitle mb-3">训练笔记</h2>
            <textarea rows="3" placeholder="今天感觉怎么样？有什么想记录的..." class="w-full bg-transparent outline-none resize-none typography-body rounded-lg p-3" style="background: var(--color-surface-muted); border: 1px solid var(--color-border-light);" aria-label="训练笔记"></textarea>
        </section>

        <!-- ── Feeling Rating ── -->
        <section class="rounded-xl p-4 mb-6" style="background: var(--color-surface); box-shadow: var(--shadow-card);" aria-label="训练感受">
            <h2 class="typography-subtitle mb-3">训练感受</h2>
            <div class="flex items-center gap-1 mb-2" role="radiogroup" aria-label="评分">
                <!-- Star 1 — empty -->
                <button class="w-10 h-10 flex items-center justify-center rounded-lg transition-colors" style="color: var(--color-border);" aria-label="很差" aria-checked="false">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </button>
                <!-- Star 2 — empty -->
                <button class="w-10 h-10 flex items-center justify-center rounded-lg transition-colors" style="color: var(--color-border);" aria-label="一般" aria-checked="false">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </button>
                <!-- Star 3 — empty -->
                <button class="w-10 h-10 flex items-center justify-center rounded-lg transition-colors" style="color: var(--color-border);" aria-label="还行" aria-checked="false">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </button>
                <!-- Star 4 — filled (selected) -->
                <button class="w-10 h-10 flex items-center justify-center rounded-lg transition-colors" style="color: var(--color-warm);" aria-label="不错" aria-checked="true">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </button>
                <!-- Star 5 — empty -->
                <button class="w-10 h-10 flex items-center justify-center rounded-lg transition-colors" style="color: var(--color-border);" aria-label="很棒" aria-checked="false">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                </button>
            </div>
            <div class="flex justify-between typography-caption" style="font-size: var(--text-xs);">
                <span>很差</span>
                <span>很棒</span>
            </div>
        </section>

        <!-- ── Action Buttons ── -->
        <section class="flex flex-col items-center gap-3" aria-label="操作">
            <button data-dom-id="finish-checkin" class="w-full h-12 rounded-full text-white font-semibold transition-all" style="background: var(--state-success); font-family: var(--font-sans); font-size: var(--text-md);">
                完成打卡
            </button>
            <a href="#" class="typography-caption underline-offset-2" style="font-size: var(--text-sm); color: var(--color-primary-light);">
                返回今日
            </a>
        </section>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
