<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第6周决策</title>
    <style id="theme-vars">
/* ============================================
   Candito Training — Brand Design Tokens
   Apple-style Minimal White
   ============================================ */

:root {
  /* ── Brand Identity ── */
  --color-primary: #1D1D1F;
  --color-primary-light: #86868B;
  --color-primary-subtle: #F5F5F7;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FAFAFA;
  --color-surface-muted: #F5F5F7;
  --color-border: #E5E5EA;
  --color-border-light: #F0F0F5;

  /* ── State Colors ── */
  --state-success: #30D158;
  --state-success-bg: rgba(48, 209, 88, 0.08);
  --state-warning: #FF9F0A;
  --state-warning-bg: rgba(255, 159, 10, 0.08);
  --state-error: #FF3B30;
  --state-error-bg: rgba(255, 59, 48, 0.08);
  --state-info: #0A84FF;
  --state-info-bg: rgba(10, 132, 255, 0.08);

  /* ── Accent (training-specific) ── */
  --color-training-main: #0A84FF;
  --color-training-assist: #5E5CE6;
  --color-training-optional: #30D158;
  --color-training-rest: #86868B;

  /* ── Warmth Accent ── */
  --color-warm: #FF6B35;
  --color-warm-light: rgba(255, 107, 53, 0.10);

  /* ── Typography Scale ── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;

  --text-xs: 0.6875rem;      /* 11px */
  --text-sm: 0.75rem;         /* 12px */
  --text-base: 0.875rem;      /* 14px */
  --text-md: 1rem;             /* 16px */
  --text-lg: 1.125rem;        /* 18px */
  --text-xl: 1.25rem;         /* 20px */
  --text-2xl: 1.5rem;         /* 24px */
  --text-3xl: 1.75rem;        /* 28px */
  --text-4xl: 2rem;           /* 32px */

  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;

  /* ── Spacing Scale ── */
  --space-1: 0.25rem;   /* 4px */
  --space-2: 0.5rem;    /* 8px */
  --space-3: 0.75rem;   /* 12px */
  --space-4: 1rem;       /* 16px */
  --space-5: 1.25rem;   /* 20px */
  --space-6: 1.5rem;    /* 24px */
  --space-8: 2rem;       /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Surface Depth (border-first, minimal shadow) ── */
  --shadow-card: 0 0 0 1px var(--color-border-light);
  --shadow-elevated: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 1px var(--color-border-light);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px var(--color-border-light);

  /* ── Transition ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
}

/* ── Utility Classes ── */
.typography-hero {
  font-family: var(--font-sans);
  font-size: var(--text-4xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.02em;
  color: var(--color-primary);
}

.typography-title {
  font-family: var(--font-sans);
  font-size: var(--text-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: -0.01em;
  color: var(--color-primary);
}

.typography-subtitle {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--font-weight-medium);
  line-height: var(--leading-tight);
  color: var(--color-primary);
}

.typography-body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary);
}

.typography-caption {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-primary-light);
}

.typography-data {
  font-family: var(--font-mono);
  font-size: var(--text-md);
  font-weight: var(--font-weight-semibold);
  color: var(--color-primary);
}

.typography-data-lg {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-8 max-w-lg mx-auto px-4">
        <!-- Status Bar Spacer -->
        <div class="h-11"></div>

        <!-- Top Navigation Bar -->
        <header class="sticky top-0 z-30 border-b bg-[var(--color-surface)]/95 backdrop-blur" style="border-color: var(--color-border);">
            <div class="flex h-11 items-center px-4">
                <div class="flex items-center justify-start w-[88px]">
                    <button data-dom-id="back-today" class="inline-flex h-8 w-8 items-center justify-center rounded-[var(--radius-md)]" aria-label="返回">
                        <i data-lucide="chevron-left" class="w-5 h-5" style="color: var(--color-primary);"></i>
                    </button>
                </div>
                <div class="min-w-0 flex-1 text-center truncate" style="font-family: var(--font-sans); font-size: var(--text-md); font-weight: var(--font-weight-semibold); color: var(--color-primary);">第6周决策</div>
                <div class="w-[88px]"></div>
            </div>
        </header>

        <!-- Celebration Header -->
        <section class="px-5 pt-6 pb-2">
            <div class="flex items-center gap-2 mb-1">
                <i data-lucide="trophy" class="w-5 h-5 shrink-0" style="color: var(--state-success);"></i>
                <p class="typography-hero" style="font-size: var(--text-2xl); text-wrap: balance;">恭喜完成第5周！</p>
            </div>
            <p class="typography-caption">第5周训练数据回顾</p>
        </section>

        <!-- Week 5 Result Cards -->
        <section class="px-5 mt-3">
            <div class="flex gap-3">
                <!-- Squat -->
                <div class="flex-1 flex flex-col items-center rounded-[var(--radius-lg)] bg-[var(--color-surface-muted)] py-3 px-2" style="box-shadow: var(--shadow-card);">
                    <span class="typography-caption mb-1.5">深蹲</span>
                    <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-lg); font-weight: var(--font-weight-bold); color: var(--color-primary);">97.5kg</span>
                    <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-primary-light);">x 3次</span>
                </div>
                <!-- Bench -->
                <div class="flex-1 flex flex-col items-center rounded-[var(--radius-lg)] bg-[var(--color-surface-muted)] py-3 px-2" style="box-shadow: var(--shadow-card);">
                    <span class="typography-caption mb-1.5">卧推</span>
                    <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-lg); font-weight: var(--font-weight-bold); color: var(--color-primary);">87.5kg</span>
                    <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-primary-light);">x 2次</span>
                </div>
                <!-- Deadlift -->
                <div class="flex-1 flex flex-col items-center rounded-[var(--radius-lg)] bg-[var(--color-surface-muted)] py-3 px-2" style="box-shadow: var(--shadow-card);">
                    <span class="typography-caption mb-1.5">硬拉</span>
                    <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-lg); font-weight: var(--font-weight-bold); color: var(--color-primary);">92.5kg</span>
                    <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-primary-light);">x 3次</span>
                </div>
            </div>
        </section>

        <!-- Estimated New 1RM Card -->
        <section class="px-5 mt-5">
            <div class="rounded-[var(--radius-xl)] bg-[var(--color-surface)] p-5" style="box-shadow: var(--shadow-elevated);">
                <!-- Title Row -->
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <i data-lucide="trending-up" class="w-4 h-4 shrink-0" style="color: var(--color-training-main);"></i>
                        <span class="typography-subtitle" style="font-size: var(--text-md);">预估新 1RM</span>
                    </div>
                </div>
                <p class="typography-caption mb-4">基于第5周完成次数自动预估</p>

                <!-- Result Rows -->
                <div class="space-y-3">
                    <!-- Squat 1RM -->
                    <div class="flex items-center justify-between py-2.5 border-b" style="border-color: var(--color-border-light);">
                        <span class="typography-body">深蹲</span>
                        <div class="flex items-baseline gap-1.5">
                            <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-primary-light);">97.5 x 1.06 =</span>
                            <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-xl); font-weight: var(--font-weight-bold); color: var(--color-training-main);">103.4 kg</span>
                        </div>
                    </div>
                    <!-- Bench 1RM -->
                    <div class="flex items-center justify-between py-2.5 border-b" style="border-color: var(--color-border-light);">
                        <span class="typography-body">卧推</span>
                        <div class="flex items-baseline gap-1.5">
                            <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-primary-light);">87.5 x 1.03 =</span>
                            <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-xl); font-weight: var(--font-weight-bold); color: var(--color-training-main);">90.1 kg</span>
                        </div>
                    </div>
                    <!-- Deadlift 1RM -->
                    <div class="flex items-center justify-between py-2.5">
                        <span class="typography-body">硬拉</span>
                        <div class="flex items-baseline gap-1.5">
                            <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-primary-light);">92.5 x 1.06 =</span>
                            <span class="whitespace-nowrap" style="font-family: var(--font-mono); font-size: var(--text-xl); font-weight: var(--font-weight-bold); color: var(--color-training-main);">98.1 kg</span>
                        </div>
                    </div>
                </div>

                <!-- Formula Note -->
                <p class="mt-3" style="font-family: var(--font-sans); font-size: var(--text-xs); color: var(--color-primary-light);">完成2次 x 1.03, 3次 x 1.06, 4次 x 1.09</p>
            </div>
        </section>

        <!-- Decision Section -->
        <section class="px-5 mt-6">
            <p class="typography-body mb-3">选择你的下一步</p>

            <div class="space-y-3">
                <!-- Option 1: Skip (Recommended) -->
                <button data-dom-id="decision-skip" class="w-full text-left rounded-[var(--radius-lg)] bg-[var(--color-surface)] p-4 border-l-[3px] transition-opacity" style="box-shadow: var(--shadow-card); border-left-color: var(--color-training-main);">
                    <div class="flex items-start gap-3">
                        <!-- Radio Selected -->
                        <div class="flex items-center justify-center w-5 h-5 mt-0.5 shrink-0 rounded-full" style="background-color: var(--color-training-main);">
                            <div class="w-2 h-2 rounded-full bg-white"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="typography-subtitle truncate" style="font-size: var(--text-base);">直接开始新周期</span>
                                <span class="inline-flex items-center rounded-[var(--radius-sm)] px-2 py-0.5 whitespace-nowrap" style="background-color: var(--state-info-bg); font-family: var(--font-sans); font-size: var(--text-xs); font-weight: var(--font-weight-medium); color: var(--color-training-main);">推荐</span>
                            </div>
                            <p class="typography-caption">使用预估1RM直接开始下一轮6周计划</p>
                        </div>
                    </div>
                </button>

                <!-- Option 2: Deload -->
                <button data-dom-id="decision-deload" class="w-full text-left rounded-[var(--radius-lg)] bg-[var(--color-surface)] p-4 border-l-[3px] border-transparent transition-opacity" style="box-shadow: var(--shadow-card);">
                    <div class="flex items-start gap-3">
                        <!-- Radio Unselected -->
                        <div class="flex items-center justify-center w-5 h-5 mt-0.5 shrink-0 rounded-full border-2" style="border-color: var(--color-border);"></div>
                        <div class="flex-1 min-w-0">
                            <span class="typography-subtitle block mb-1 truncate" style="font-size: var(--text-base);">减载周</span>
                            <p class="typography-caption">先做一周减载训练（重做第1周，降低容量），再开始新周期</p>
                        </div>
                    </div>
                </button>

                <!-- Option 3: Test 1RM -->
                <button data-dom-id="decision-test" class="w-full text-left rounded-[var(--radius-lg)] bg-[var(--color-surface)] p-4 border-l-[3px] border-transparent transition-opacity" style="box-shadow: var(--shadow-card);">
                    <div class="flex items-start gap-3">
                        <!-- Radio Unselected -->
                        <div class="flex items-center justify-center w-5 h-5 mt-0.5 shrink-0 rounded-full border-2" style="border-color: var(--color-border);"></div>
                        <div class="flex-1 min-w-0">
                            <span class="typography-subtitle block mb-1 truncate" style="font-size: var(--text-base);">实测1RM</span>
                            <p class="typography-caption">本周实测最大重量，获得准确新1RM后再决定</p>
                        </div>
                    </div>
                </button>
            </div>
        </section>

        <!-- Bottom CTA -->
        <section class="px-5 mt-6">
            <button data-dom-id="confirm-decision" class="w-full flex items-center justify-center rounded-[var(--radius-full)] px-6 py-3.5 text-white font-semibold transition-opacity" style="background-color: var(--color-training-main); font-family: var(--font-sans); font-size: var(--text-md);">
                确认选择
            </button>
        </section>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
